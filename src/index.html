<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/run/almanac/" />
  <title>Almanac</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--hub-font, system-ui, sans-serif);
      font-size: var(--hub-font-size, 15px);
      background: var(--hub-bg, #f9fafb);
      color: var(--hub-text, #111827);
      min-height: 100vh;
    }

    /* ── Header ── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 0;
    }
    .app-header h1 { font-size: 1.25rem; font-weight: 700; }
    .btn-gear {
      background: none;
      border: 1px solid var(--hub-border, #e5e7eb);
      border-radius: var(--hub-radius, 6px);
      padding: 6px 10px;
      cursor: pointer;
      font-size: 1rem;
      color: var(--hub-text-muted, #6b7280);
      line-height: 1;
    }
    .btn-gear:hover { background: var(--hub-surface, #fff); color: var(--hub-text, #111827); }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 12px 20px 0;
      border-bottom: 1px solid var(--hub-border, #e5e7eb);
    }
    .tab-btn {
      padding: 8px 16px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--hub-text-muted, #6b7280);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      font-family: inherit;
      border-radius: var(--hub-radius, 6px) var(--hub-radius, 6px) 0 0;
    }
    .tab-btn.active {
      color: var(--hub-primary, #6366f1);
      border-bottom-color: var(--hub-primary, #6366f1);
      font-weight: 600;
    }
    .tab-btn:hover:not(.active) { color: var(--hub-text, #111827); }

    .tab-panel { display: none; padding: 20px; }
    .tab-panel.active { display: block; }

    /* ── Event cards ── */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .event-card {
      background: var(--hub-surface, #fff);
      border: 1px solid var(--hub-border, #e5e7eb);
      border-radius: var(--hub-radius, 8px);
      padding: 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: box-shadow .15s;
    }
    .event-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-icon { font-size: 1.4rem; line-height: 1; flex-shrink: 0; }
    .card-name { font-weight: 600; flex: 1; }
    .btn-log {
      background: var(--hub-primary, #6366f1);
      color: var(--hub-primary-fg, #fff);
      border: none;
      border-radius: var(--hub-radius, 6px);
      width: 28px;
      height: 28px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      line-height: 1;
    }
    .btn-log:hover { background: var(--hub-primary-hover, #4f46e5); }

    .card-this-year {
      font-size: 0.85rem;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .card-this-year.logged { color: #166534; background: #dcfce7; }
    .card-this-year.pending { color: var(--hub-text-muted, #6b7280); background: var(--hub-bg, #f9fafb); }

    .card-prev-year, .card-count {
      font-size: 0.8rem;
      color: var(--hub-text-muted, #6b7280);
    }

    /* ── History tab ── */
    .history-year { margin-bottom: 24px; }
    .year-label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--hub-text-muted, #6b7280);
      margin-bottom: 8px;
    }
    .history-rows {
      background: var(--hub-surface, #fff);
      border: 1px solid var(--hub-border, #e5e7eb);
      border-radius: var(--hub-radius, 8px);
      overflow: hidden;
    }
    .history-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--hub-border, #e5e7eb);
    }
    .history-row:last-child { border-bottom: none; }
    .hist-icon { font-size: 1.2rem; flex-shrink: 0; }
    .hist-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .hist-name { font-weight: 500; font-size: 0.9rem; }
    .hist-date { font-size: 0.85rem; color: var(--hub-text-muted, #6b7280); }
    .hist-notes { font-size: 0.8rem; color: var(--hub-text-muted, #6b7280); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hist-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .hist-who { font-size: 0.8rem; color: var(--hub-text-muted, #6b7280); }

    /* ── Modals ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }
    .modal {
      background: var(--hub-surface, #fff);
      border-radius: var(--hub-radius, 10px);
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .modal-wide { max-width: 720px; }

    .modal-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 20px 20px 0;
    }
    .modal-icon { font-size: 2rem; line-height: 1; flex-shrink: 0; }
    .modal-title { font-size: 1.1rem; font-weight: 700; }
    .modal-subtitle { font-size: 0.85rem; color: var(--hub-text-muted, #6b7280); margin-top: 2px; }
    .btn-close {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: var(--hub-text-muted, #6b7280);
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .btn-close:hover { background: var(--hub-bg, #f9fafb); color: var(--hub-text, #111827); }

    /* ── Detail modal ── */
    .detail-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      padding: 16px 20px 0;
    }
    .stat {
      flex: 1;
      min-width: 80px;
      background: var(--hub-bg, #f9fafb);
      border-radius: 6px;
      padding: 10px 12px;
      text-align: center;
    }
    .stat-val { font-size: 1.05rem; font-weight: 700; }
    .stat-label { font-size: 0.75rem; color: var(--hub-text-muted, #6b7280); margin-top: 2px; }

    .modal-actions-top { padding: 14px 20px 0; }

    .detail-history { padding: 16px 20px 20px; }
    .detail-history h3 { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--hub-text-muted, #6b7280); margin-bottom: 10px; }

    .obs-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .obs-table th {
      text-align: left;
      padding: 6px 8px;
      color: var(--hub-text-muted, #6b7280);
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      border-bottom: 1px solid var(--hub-border, #e5e7eb);
    }
    .obs-table td {
      padding: 8px 8px;
      border-bottom: 1px solid var(--hub-border, #e5e7eb);
      vertical-align: top;
    }
    .obs-table tr:last-child td { border-bottom: none; }
    .notes-cell { color: var(--hub-text-muted, #6b7280); font-style: italic; max-width: 160px; }

    .avg-diff { font-size: 0.8rem; font-weight: 500; padding: 1px 6px; border-radius: 4px; white-space: nowrap; }
    .avg-diff.earlier { color: #166534; background: #dcfce7; }
    .avg-diff.later   { color: #92400e; background: #fef3c7; }
    .avg-exact        { font-size: 0.8rem; color: var(--hub-text-muted, #6b7280); }

    .timeline-wrap {
      margin: 4px 0 16px;
      padding: 12px;
      background: var(--hub-bg, #f9fafb);
      border-radius: 6px;
    }
    .timeline-label { font-size: 0.75rem; color: var(--hub-text-muted, #6b7280); margin-bottom: 8px; }
    .timeline-bar {
      position: relative;
      height: 8px;
      background: var(--hub-border, #e5e7eb);
      border-radius: 4px;
      margin-bottom: 6px;
    }
    .timeline-avg {
      position: absolute;
      top: -4px;
      width: 2px;
      height: 16px;
      background: var(--hub-primary, #6366f1);
      border-radius: 1px;
    }
    .timeline-dot {
      position: absolute;
      top: 0;
      width: 8px;
      height: 8px;
      background: var(--hub-text-muted, #6b7280);
      border-radius: 50%;
      transform: translateX(-50%);
    }
    .timeline-dot.this-year { background: var(--hub-primary, #6366f1); }
    .timeline-ends { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--hub-text-muted, #6b7280); }

    .detail-empty { color: var(--hub-text-muted, #6b7280); font-size: 0.9rem; padding: 12px 0; }

    /* ── Manage modal ── */
    .manage-list { padding: 16px 20px 0; display: flex; flex-direction: column; gap: 2px; }
    .manage-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--hub-bg, #f9fafb);
      border-radius: var(--hub-radius, 6px);
    }
    .manage-icon { font-size: 1.2rem; }
    .manage-name { flex: 1; font-weight: 500; }
    .manage-actions { display: flex; gap: 6px; }
    .manage-empty { color: var(--hub-text-muted, #6b7280); font-size: 0.9rem; }

    /* ── Forms ── */
    .form-body { padding: 16px 20px 0; display: flex; flex-direction: column; gap: 14px; }
    .form-label { font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: -8px; }
    .optional { font-weight: 400; color: var(--hub-text-muted, #6b7280); }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--hub-border, #e5e7eb);
      border-radius: var(--hub-radius, 6px);
      font-family: inherit;
      font-size: 0.9rem;
      background: var(--hub-surface, #fff);
      color: var(--hub-text, #111827);
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: 2px solid var(--hub-primary, #6366f1);
      outline-offset: -1px;
      border-color: transparent;
    }
    .form-textarea { resize: vertical; }
    .emoji-input { font-size: 1.3rem; text-align: center; max-width: 80px; }

    /* ── Emoji picker ── */
    .emoji-field { display: flex; align-items: flex-start; gap: 12px; }
    .emoji-picker {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
      gap: 4px;
    }
    .emoji-option {
      font-size: 1.25rem;
      line-height: 1;
      height: 38px;
      border: 1px solid var(--hub-border, #e5e7eb);
      border-radius: var(--hub-radius, 6px);
      background: var(--hub-surface, #fff);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .emoji-option:hover { background: var(--hub-bg, #f9fafb); }
    .emoji-option.selected {
      border-color: var(--hub-primary, #6366f1);
      background: var(--hub-bg, #f9fafb);
      box-shadow: inset 0 0 0 1px var(--hub-primary, #6366f1);
    }

    /* ── Buttons ── */
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 16px 20px 20px;
    }
    .btn-primary {
      background: var(--hub-primary, #6366f1);
      color: var(--hub-primary-fg, #fff);
      border: none;
      border-radius: var(--hub-radius, 6px);
      padding: 8px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary:hover:not(:disabled) { background: var(--hub-primary-hover, #4f46e5); }
    .btn-primary:disabled { opacity: .6; cursor: default; }
    .btn-secondary {
      background: var(--hub-bg, #f9fafb);
      color: var(--hub-text, #111827);
      border: 1px solid var(--hub-border, #e5e7eb);
      border-radius: var(--hub-radius, 6px);
      padding: 8px 16px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-secondary:hover { background: var(--hub-border, #e5e7eb); }
    .btn-icon-sm {
      background: none;
      border: 1px solid var(--hub-border, #e5e7eb);
      border-radius: 4px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--hub-text-muted, #6b7280);
      padding: 0;
    }
    .btn-icon-sm:hover { background: var(--hub-bg, #f9fafb); color: var(--hub-text, #111827); }
    .btn-icon-sm.danger:hover { color: #dc2626; border-color: #dc2626; }

    /* ── Empty states ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 60px 24px;
      gap: 10px;
      color: var(--hub-text-muted, #6b7280);
    }
    .empty-icon { font-size: 2.5rem; }
    .empty-title { font-size: 1rem; font-weight: 600; color: var(--hub-text, #111827); }
    .empty-sub { font-size: 0.88rem; max-width: 320px; line-height: 1.5; }
  </style>
</head>
<body>

<div class="app-header">
  <h1>📅 Almanac</h1>
  <button class="btn-gear" onclick="window.openManageModal()" title="Manage event types">⚙</button>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="events" onclick="setTab('events')">Events</button>
  <button class="tab-btn" data-tab="history" onclick="setTab('history')">History</button>
</div>

<div id="panel-events" class="tab-panel active"></div>
<div id="panel-history" class="tab-panel"></div>

<script type="module">
import { esc, memberColor, initial, hubConfirm } from "/hub-sdk.js";
import {
  dayOfYear, dayOfYearToDate, formatDate,
  averageDayOfYear, compareToAverage,
  thisYear, todayStr,
} from "./logic.js";

const DB      = window.__DB_URL      ?? "";
const CONTEXT = window.__CONTEXT_URL ?? "";
const APP_ID  = window.__APP_ID ?? "almanac";
const ME      = window.__CURRENT_MEMBER ?? null;

let members    = [];
let memberMap  = new Map();
let eventTypes = [];          // active (non-archived) — Events tab, pickers, manage
let allTypesById = new Map(); // includes archived — History tab still renders their observations
let observations = [];
let activeTab  = "events";

// Curated palette for the emoji picker (any emoji can still be typed manually)
const EMOJI_CHOICES = [
  "📅","❄️","🌡️","🌸","🌷","🌻","🌹","🌼","🌱","🍀","🍂","🍁",
  "🌾","🌳","🌲","🍄","🌰","🌽","🍓","🍎","🎃","✨","☀️","🌙",
  "⭐","🌈","🌧️","⛈️","🌊","💨","🐦","🦋","🐝","🐞","🐸","🦌",
  "🐿️","🪺","🥚","🐛","🐌","🌬️",
];

// Renders a clickable emoji grid bound to a hidden text input with id `f-icon`.
function emojiPickerHtml(current) {
  const cur = current || "📅";
  const buttons = EMOJI_CHOICES.map(em =>
    `<button type="button" class="emoji-option${em === cur ? " selected" : ""}" onclick="window.pickEmoji('${em}')">${em}</button>`
  ).join("");
  return `
    <div class="emoji-field">
      <input id="f-icon" type="text" class="form-input emoji-input" value="${esc(cur)}" maxlength="4"
             oninput="window.syncEmojiPicker()" aria-label="Selected emoji" />
      <div class="emoji-picker" id="emoji-picker">${buttons}</div>
    </div>`;
}

window.pickEmoji = function(em) {
  const input = document.getElementById("f-icon");
  if (input) input.value = em;
  window.syncEmojiPicker();
};

window.syncEmojiPicker = function() {
  const input = document.getElementById("f-icon");
  const picker = document.getElementById("emoji-picker");
  if (!input || !picker) return;
  const val = input.value.trim();
  picker.querySelectorAll(".emoji-option").forEach(btn => {
    btn.classList.toggle("selected", btn.textContent === val);
  });
};

// Track which panels need a rebuild; skip re-rendering unchanged tabs
const dirtyPanels = new Set(["events", "history"]);
function markDirty() { dirtyPanels.add("events"); dirtyPanels.add("history"); }

async function db(sql, params = []) {
  if (!DB) return { rows: [] };
  const res = await fetch(DB, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sql, params }),
  });
  if (!res.ok) throw new Error(`db request failed: ${res.status}`);
  return res.json();
}

// Lightweight transient toast for surfacing failed optimistic writes.
let toastEl = null;
function toast(msg) {
  toastEl?.remove();
  toastEl = document.createElement("div");
  toastEl.textContent = msg;
  toastEl.style.cssText =
    "position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:200;" +
    "background:#111827;color:#fff;padding:10px 16px;border-radius:8px;font-size:0.85rem;" +
    "box-shadow:0 4px 16px rgba(0,0,0,.25);max-width:90vw;";
  document.body.appendChild(toastEl);
  setTimeout(() => { toastEl?.remove(); toastEl = null; }, 4000);
}

// Single delegated click handler for all DB-id-bearing controls. Interpolating
// ids into inline on* handler strings is a JS-context injection sink (HTML
// escaping is decoded back before the JS parser runs); data-* attributes are not.
document.addEventListener("click", e => {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const { action, id, reopen } = el.dataset;
  switch (action) {
    case "open-detail":    window.openEventDetail(id); break;
    case "log":            window.openLogModal(id); break;
    case "delete-obs":     window.deleteObservation(id, reopen || null); break;
    case "edit-type":      window.openEditEventTypeModal(id); break;
    case "archive-type":   window.archiveEventType(id); break;
    case "edit-type-save": window.submitEditEventType(id); break;
  }
});

async function loadMembers() {
  if (!CONTEXT) {
    members = [
      { id: "demo-1", name: "Alex", role: "adult" },
      { id: "demo-2", name: "Sam",  role: "adult" },
    ];
    memberMap = new Map(members.map(m => [m.id, m]));
    return;
  }
  try {
    const res = await fetch(`${CONTEXT}?keys=family.members`);
    members = ((await res.json())["family.members"]) ?? [];
  } catch { members = []; }
  memberMap = new Map(members.map(m => [m.id, m]));
}

async function loadData() {
  if (!DB) {
    seedDemo();
    markDirty();
    return;
  }
  const [{ rows: et }, { rows: obs }] = await Promise.all([
    db(`SELECT id, name, icon, description, created_by, created_at, archived_at
        FROM app_almanac__event_types`),
    db(`SELECT id, event_type_id, observed_date, year, day_of_year, notes, logged_by, created_at
        FROM app_almanac__observations ORDER BY observed_date DESC`),
  ]);
  const allTypes = et.slice().sort((a, b) => a.name.localeCompare(b.name));
  allTypesById = new Map(allTypes.map(e => [e.id, e]));
  eventTypes   = allTypes.filter(e => !e.archived_at);
  observations = obs;
  markDirty();
}

function seedDemo() {
  const yr = thisYear();
  eventTypes = [
    { id: "et-1", name: "First Frost",          icon: "❄️",  description: "First hard frost of autumn",       created_by: "demo-1", created_at: `${yr-4}-01-01`, archived_at: null },
    { id: "et-2", name: "Cherry Blossoms",       icon: "🌸",  description: "Cherry trees fully in bloom",      created_by: "demo-1", created_at: `${yr-4}-01-01`, archived_at: null },
    { id: "et-3", name: "Last Frost",            icon: "🌡️", description: "Last killing frost of spring",     created_by: "demo-1", created_at: `${yr-4}-01-01`, archived_at: null },
    { id: "et-4", name: "First Firefly",         icon: "✨",  description: "First firefly sighting of summer", created_by: "demo-2", created_at: `${yr-3}-01-01`, archived_at: null },
    { id: "et-5", name: "First Leaves Turning",  icon: "🍂",  description: "First autumn color in the trees",  created_by: "demo-1", created_at: `${yr-4}-01-01`, archived_at: null },
  ];
  allTypesById = new Map(eventTypes.map(e => [e.id, e]));
  observations = [
    // First Frost (avg ~Oct 30, doy ~303)
    { id:"o-1",  event_type_id:"et-1", observed_date:`${yr-4}-10-28`, year:yr-4, day_of_year:dayOfYear(`${yr-4}-10-28`), notes:"",                  logged_by:"demo-1", created_at:`${yr-4}-10-28T00:00:00Z` },

window.setTab = function(tab) {
  activeTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === `panel-${tab}`));

// ── Render ─────────────────────────────────────────────────────────────────────

function render() {
  if (activeTab === "events") {
    if (dirtyPanels.has("events")) { renderEvents(); dirtyPanels.delete("events"); }
  } else {
    if (dirtyPanels.has("history")) { renderHistory(); dirtyPanels.delete("history"); }
  }
}

function renderEvents() {
  const yr    = thisYear();
  const panel = document.getElementById("panel-events");

  if (eventTypes.length === 0) {
    panel.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📅</div>
        <div class="empty-title">No events tracked yet</div>
        <div class="empty-sub">Click ⚙ to add your first event — things like "First Frost" or "Roses in Bloom".</div>
      </div>`;
    return;
  }

  // Pre-index observations by event_type_id once instead of O(n) per card
  const obsByType = new Map();
  for (const o of observations) {
    if (!obsByType.has(o.event_type_id)) obsByType.set(o.event_type_id, []);
    obsByType.get(o.event_type_id).push(o);
  }

  panel.innerHTML = `<div class="events-grid">${eventTypes.map(et => renderEventCard(et, yr, obsByType)).join("")}</div>`;
}

function renderEventCard(et, yr, obsByType) {
  const etObs      = obsByType?.get(et.id) ?? observations.filter(o => o.event_type_id === et.id);
  const thisYrObs  = etObs.filter(o => o.year === yr);
  const prevYrObs  = etObs.filter(o => o.year === yr - 1);
  const avgDoy     = averageDayOfYear(etObs);

  let thisYrHtml;
  if (thisYrObs.length > 0) {
    const dates = thisYrObs.map(o => formatDate(o.observed_date)).join(" &amp; ");
    thisYrHtml = `<div class="card-this-year logged">✓ ${dates}</div>`;
  } else {
    thisYrHtml = `<div class="card-this-year pending">Not yet logged this year</div>`;
  }

  let prevHtml = "";
  if (prevYrObs.length > 0) {
    const dates = prevYrObs.map(o => formatDate(o.observed_date)).join(" &amp; ");
    prevHtml = `<div class="card-prev-year">Last year: ${dates}</div>`;
  } else if (avgDoy !== null) {
    prevHtml = `<div class="card-prev-year">Avg: around ${dayOfYearToDate(avgDoy, yr)}</div>`;
  }

  const total = etObs.length;
  return `
    <div class="event-card" data-action="open-detail" data-id="${esc(et.id)}">
      <div class="card-header">
        <span class="card-icon">${esc(et.icon)}</span>
        <span class="card-name">${esc(et.name)}</span>
        <button class="btn-log" data-action="log" data-id="${esc(et.id)}" title="Log observation">＋</button>
      </div>
      ${thisYrHtml}
      ${prevHtml}
      <div class="card-count">${total} observation${total !== 1 ? "s" : ""} total</div>
    </div>`;
}

function renderHistory() {
  const panel = document.getElementById("panel-history");

  if (observations.length === 0) {
    panel.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">No observations yet</div>
        <div class="empty-sub">Log seasonal events from the Events tab to start building your almanac.</div>
      </div>`;
    return;
  }

  // Pre-index once: group observations by year, index eventTypes by id
  const obsByYear = new Map();
  for (const o of observations) {
    if (!obsByYear.has(o.year)) obsByYear.set(o.year, []);
    obsByYear.get(o.year).push(o);
  }
  const etById = allTypesById.size ? allTypesById : new Map(eventTypes.map(e => [e.id, e]));

  const years = [...obsByYear.keys()].sort((a, b) => b - a);
  let html = "";

  for (const yr of years) {
    const yearObs = obsByYear.get(yr).slice().sort((a, b) => b.observed_date.localeCompare(a.observed_date));

    html += `<div class="history-year"><div class="year-label">${yr}</div><div class="history-rows">`;
    for (const obs of yearObs) {
      const et = etById.get(obs.event_type_id);
      if (!et) continue;
      const memberName = memberMap.get(obs.logged_by)?.name ?? "Someone";
      html += `
        <div class="history-row">
          <span class="hist-icon">${esc(et.icon)}</span>
          <div class="hist-info">
            <span class="hist-name">${esc(et.name)}</span>
            <span class="hist-date">${formatDate(obs.observed_date)}</span>
            ${obs.notes ? `<span class="hist-notes">${esc(obs.notes)}</span>` : ""}
          </div>
          <div class="hist-meta">
            <span class="hist-who">${esc(memberName)}</span>
            <button class="btn-icon-sm danger" data-action="delete-obs" data-id="${esc(obs.id)}" title="Delete">×</button>
          </div>
        </div>`;
    }
    html += `</div></div>`;
  }

  panel.innerHTML = html;
}

let modalEl = null;

function openModal(html, wide = false) {
  closeModal();
  modalEl = document.createElement("div");
  modalEl.className = "modal-backdrop";
  modalEl.innerHTML = `<div class="modal${wide ? " modal-wide" : ""}">${html}</div>`;
  modalEl.addEventListener("click", e => { if (e.target === modalEl) closeModal(); });
  document.body.appendChild(modalEl);
}

function closeModal() { modalEl?.remove(); modalEl = null; }
window.closeModal = closeModal;

// ── Event Detail Modal ─────────────────────────────────────────────────────────

window.openEventDetail = function(id) {
  const et    = eventTypes.find(e => e.id === id);
  if (!et) return;

  const etObs  = observations.filter(o => o.event_type_id === id);
  const yr     = thisYear();
  const avgDoy = averageDayOfYear(etObs);
  const doys   = etObs.map(o => o.day_of_year);
  const minDoy = doys.length ? Math.min(...doys) : null;
  const maxDoy = doys.length ? Math.max(...doys) : null;
  const yearsTracked = [...new Set(etObs.map(o => o.year))].length;

  const statsHtml = `
    <div class="detail-stats">
      <div class="stat"><div class="stat-val">${etObs.length}</div><div class="stat-label">Observations</div></div>
      <div class="stat"><div class="stat-val">${yearsTracked}</div><div class="stat-label">Years</div></div>
      ${avgDoy !== null ? `<div class="stat"><div class="stat-val">${dayOfYearToDate(avgDoy, yr)}</div><div class="stat-label">Average</div></div>` : ""}
      ${minDoy !== null ? `<div class="stat"><div class="stat-val">${dayOfYearToDate(minDoy, yr)}</div><div class="stat-label">Earliest</div></div>` : ""}
      ${maxDoy !== null ? `<div class="stat"><div class="stat-val">${dayOfYearToDate(maxDoy, yr)}</div><div class="stat-label">Latest</div></div>` : ""}
    </div>`;

  let timelineHtml = "";
  if (etObs.length >= 2 && minDoy !== maxDoy) {
    const range = maxDoy - minDoy;
    const avgPct = Math.round(((avgDoy - minDoy) / range) * 100);
    const dots = etObs.map(o => {
      const pct = Math.round(((o.day_of_year - minDoy) / range) * 100);
      const isTY = o.year === yr;
      return `<div class="timeline-dot${isTY ? " this-year" : ""}" style="left:${pct}%" title="${o.year}: ${formatDate(o.observed_date)}"></div>`;
    }).join("");
    timelineHtml = `
      <div class="timeline-wrap">
        <div class="timeline-label">Year-over-year range</div>
        <div class="timeline-bar">
          ${dots}
          <div class="timeline-avg" style="left:${avgPct}%" title="Average"></div>
        </div>
        <div class="timeline-ends">
          <span>${dayOfYearToDate(minDoy, yr)}</span>
          <span style="color:var(--hub-primary,#6366f1);font-weight:600">avg ${dayOfYearToDate(avgDoy, yr)}</span>
          <span>${dayOfYearToDate(maxDoy, yr)}</span>
        </div>
      </div>`;
  }

  let tableHtml;
  if (etObs.length === 0) {
    tableHtml = `<div class="detail-empty">No observations yet — be the first to log it!</div>`;
  } else {
    const sortedYears = [...new Set(etObs.map(o => o.year))].sort((a, b) => b - a);
    let rows = "";
    for (const year of sortedYears) {
      const yearObs = etObs
        .filter(o => o.year === year)
        .sort((a, b) => a.observed_date.localeCompare(b.observed_date));
      for (const obs of yearObs) {
        const member     = memberMap.get(obs.logged_by);
        const memberName = member ? member.name : "?";
        let cmpHtml      = "";
        if (avgDoy !== null) {
          const cmp = compareToAverage(obs.day_of_year, avgDoy);
          if (cmp.diff === 0) cmpHtml = `<span class="avg-exact">avg</span>`;
          else cmpHtml = `<span class="avg-diff ${cmp.diff < 0 ? "earlier" : "later"}">${esc(cmp.label)}</span>`;
        }
        rows += `
          <tr>
            <td>${year}</td>
            <td><strong>${formatDate(obs.observed_date)}</strong></td>
            <td>${cmpHtml}</td>
            <td class="notes-cell">${esc(obs.notes)}</td>
            <td>${esc(memberName)}</td>
            <td><button class="btn-icon-sm danger" data-action="delete-obs" data-id="${esc(obs.id)}" data-reopen="${esc(id)}" title="Delete">×</button></td>
          </tr>`;
      }
    }
    tableHtml = `
      <h3>History</h3>
      ${timelineHtml}
      <table class="obs-table">
        <thead><tr><th>Year</th><th>Date</th><th>vs avg</th><th>Notes</th><th>By</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  openModal(`
    <div class="modal-header">
      <span class="modal-icon">${esc(et.icon)}</span>
      <div>
        <div class="modal-title">${esc(et.name)}</div>
        ${et.description ? `<div class="modal-subtitle">${esc(et.description)}</div>` : ""}
      </div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    ${statsHtml}
    <div class="modal-actions-top">
      <button class="btn-primary" data-action="log" data-id="${esc(id)}">＋ Log Observation</button>
    </div>
    <div class="detail-history">${tableHtml}</div>
  `, true);
};

window.submitLogObservation = async function() {
  const eventTypeId = document.getElementById("f-event-type").value;
  const date        = document.getElementById("f-date").value;
  const notes       = document.getElementById("f-notes").value.trim();
  if (!eventTypeId || !date) return;

  const id  = crypto.randomUUID();
  const yr  = parseInt(date.split("-")[0], 10);
  const doy = dayOfYear(date);
  const now = new Date().toISOString();

  // Optimistic: prepend to local observations, close modal, render immediately
  observations.unshift({ id, event_type_id: eventTypeId, observed_date: date, year: yr, day_of_year: doy, notes, logged_by: ME?.id ?? "system", created_at: now });
  closeModal();
  markDirty();
  render();

  db(
    `INSERT INTO app_almanac__observations (id, event_type_id, observed_date, year, day_of_year, notes, logged_by, created_at)
     VALUES (?, ?, ?, ?, ?, ?, ?, ?)`,
    [id, eventTypeId, date, yr, doy, notes, ME?.id ?? "system", now]
  ).catch(() => {
    observations = observations.filter(o => o.id !== id);
    markDirty();
    render();
    toast("Couldn't save observation — please try again.");
  });
};

// ── Delete Observation ─────────────────────────────────────────────────────────

window.deleteObservation = async function(obsId, reopenEventTypeId) {
  const confirmed = await hubConfirm({
    message: "Delete this observation?",
    confirmLabel: "Delete",
    destructive: true,
  });
  if (!confirmed) return;

  // Optimistic: remove from local state, close modal, render immediately
  const removed = observations.find(o => o.id === obsId);
  observations = observations.filter(o => o.id !== obsId);
  closeModal();
  markDirty();
  render();
  if (reopenEventTypeId) window.openEventDetail(reopenEventTypeId);

  db(`DELETE FROM app_almanac__observations WHERE id = ?`, [obsId]).catch(() => {
    if (removed) observations.unshift(removed);
    markDirty();
    render();
    toast("Couldn't delete observation — please try again.");
  });
};

window.submitAddEventType = async function() {
  const icon = document.getElementById("f-icon").value.trim() || "📅";

  if (!name) { document.getElementById("f-name").focus(); return; }

  const id  = crypto.randomUUID();

  // Optimistic: append to local eventTypes, close modal, render immediately
  const newType = { id, name, icon, description: desc, created_by: ME?.id ?? "system", created_at: now, archived_at: null };
  eventTypes = [...eventTypes, newType].sort((a, b) => a.name.localeCompare(b.name));
  allTypesById.set(id, newType);
  closeModal();
  markDirty();
  render();

  db(
    `INSERT INTO app_almanac__event_types (id, name, icon, description, created_by, created_at)
     VALUES (?, ?, ?, ?, ?, ?)`,
    [id, name, icon, desc, ME?.id ?? "system", now]
  ).catch(() => {
    eventTypes = eventTypes.filter(e => e.id !== id);
    allTypesById.delete(id);
    markDirty();
    render();
    toast("Couldn't create event type — please try again.");

};

  const icon = document.getElementById("f-icon").value.trim() || "📅";
  const name = document.getElementById("f-name").value.trim();
  const desc = document.getElementById("f-desc").value.trim();
  if (!name) { document.getElementById("f-name").focus(); return; }

  // Optimistic: update in local eventTypes, close modal, render immediately
  const et = eventTypes.find(e => e.id === id);
  const prev = et ? { name: et.name, icon: et.icon, description: et.description } : null;
  if (et) Object.assign(et, { name, icon, description: desc });
  eventTypes = [...eventTypes].sort((a, b) => a.name.localeCompare(b.name));
  closeModal();
  markDirty();
  render();

  db(`UPDATE app_almanac__event_types SET name = ?, icon = ?, description = ? WHERE id = ?`, [name, icon, desc, id])
    .catch(() => {
      if (et && prev) Object.assign(et, prev);
      eventTypes = [...eventTypes].sort((a, b) => a.name.localeCompare(b.name));
      markDirty();
      render();
      toast("Couldn't save changes — please try again.");
    });
};

window.archiveEventType = async function(id) {
  const et = eventTypes.find(e => e.id === id);
  if (!et) return;
  const confirmed = await hubConfirm({
    message: `Remove "${et.name}"?`,
    description: "This hides the event type. Existing observations are preserved.",
    confirmLabel: "Remove",
    destructive: true,
  });
  if (!confirmed) return;
  const now = new Date().toISOString();

  // Optimistic: remove from local eventTypes, re-render manage modal immediately
  const removed = eventTypes.find(e => e.id === id);
  eventTypes = eventTypes.filter(e => e.id !== id);
  markDirty();
  render();
  window.openManageModal();

  db(`UPDATE app_almanac__event_types SET archived_at = ? WHERE id = ?`, [now, id]).catch(() => {
    if (removed) eventTypes = [...eventTypes, removed].sort((a, b) => a.name.localeCompare(b.name));
    markDirty();
    render();
    window.openManageModal();
    toast("Couldn't remove event type — please try again.");
  });
};

// ── Deep link ─────────────────────────────────────────────────────────────────

function handleDeepLink() {
  const params  = new URLSearchParams(window.location.search);
  const etId    = params.get("eventTypeId");
  if (etId) window.openEventDetail(etId);
}

// ── Init ───────────────────────────────────────────────────────────────────────

(async () => {
  try {
    await Promise.all([loadMembers(), loadData()]);
  } catch {
    markDirty();
    toast("Couldn't load your almanac — please refresh.");
  }
  handleDeepLink();
  render();
})();
</script>
</body>
</html>
